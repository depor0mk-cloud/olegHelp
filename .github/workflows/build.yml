name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          python3-setuptools \
          python3-wheel \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          build-essential \
          libssl-dev \
          libffi-dev \
          libsqlite3-dev
    
    - name: Install buildozer
      run: |
        pip3 install buildozer
        pip3 install cython==0.29.33
    
    - name: Build APK
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: vpn-shield-apk
        path: bin/*.apk
